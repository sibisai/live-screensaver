<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Romania</title>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Glass clock */
    #clock{
      position:fixed;
      z-index:10;
      top:16px; left:50%;
      transform:translateX(-50%);
      padding:10px 18px;
      border-radius:16px;
      color:#fff;
      font:600 18px/1.1 ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing:0.5px;
      text-align:center;
      user-select:none;
    }

    /* Keep text above */
    #clock span{
      position:relative;
      z-index:2;
    }

      #tabs{
        position:relative; display:inline-flex; gap:0; padding:6px; border-radius:16px;
        overflow:hidden;
        isolation:isolate;
      }

      /* Ensure buttons and thumb sit above layers */
      .tabbtn, #seg-thumb{ position:relative; z-index:1; }

    /* Segmented control dock (Apple-style), centered UNDER the clock */
    #overlay{
      position:fixed; z-index:12; top:64px; left:50%; transform:translateX(-50%);
      opacity:0; pointer-events:none; transition:opacity .25s ease;
    }

    .tabbtn{
      position:relative; z-index:3;
      min-width:92px; min-height:36px; padding:6px 14px;
      border:none; border-radius:12px; background:transparent;
      color:#fff; font:600 14px ui-sans-serif,system-ui; cursor:pointer; user-select:none;
      z-index:2;
    }
    .tabbtn:focus{ outline:2px solid rgba(255,255,255,0.75); outline-offset:2px; border-radius:12px; }

    /* animated thumb behind selected tab */
    #seg-thumb{
      position:absolute; top:6px; left:0px; height:36px; width:92px; border-radius:12px;
      background:rgba(255,255,255,0.9);
      box-shadow:0 4px 16px rgba(0,0,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.6);
      transition:transform .18s ease, width .18s ease;
      will-change:transform,width;

      z-index:2;
    }

    /* show-on-motion */
    .overlay-visible #overlay{ opacity:1; pointer-events:auto; }

    /* Hover preview thumb (ghost) */
    #seg-hover{
      position:absolute; top:6px; left:0; height:36px; width:92px; border-radius:12px;
      background:rgba(255,255,255,0.35);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,0.45);
      transition:transform .18s ease, width .18s ease, opacity .18s ease;
      will-change:transform,width,opacity;
      opacity:0; pointer-events:none; z-index:1;   /* sits under buttons, above glass */
    }

    /* Button hover/active feedback */
    .tabbtn:active{ transform:translateY(1px) scale(0.99); }

    /* keep white on hover for non-selected tabs */
    .tabbtn:hover { color:#fff; }

    .tabbtn:not([aria-selected="true"]):hover {
      background: rgba(250, 250, 250, 0.08);
      color:#fff; /* <-- don't inherit */
    }

    /* selected tab stays black (even on hover) */
    .tabbtn[aria-selected="true"],
    .tabbtn[aria-selected="true"]:hover {
      color:#000;
    }

    /* ── GlassSurface ── */
    .glass-surface {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: opacity 0.26s ease-out;
    }
    .glass-surface__filter {
      width: 100%;
      height: 100%;
      pointer-events: none;
      position: absolute;
      inset: 0;
      opacity: 0;
      z-index: -1;
    }
    .glass-surface--svg {
      background: light-dark(hsl(0 0% 100% / var(--glass-frost, 0)), hsl(0 0% 0% / var(--glass-frost, 0)));
      backdrop-filter: var(--filter-id, url(#glass-filter)) saturate(var(--glass-saturation, 1));
      -webkit-backdrop-filter: var(--filter-id, url(#glass-filter)) saturate(var(--glass-saturation, 1));
      box-shadow:
        0 0 2px 1px light-dark(color-mix(in oklch, black, transparent 85%), color-mix(in oklch, white, transparent 65%)) inset,
        0 0 10px 4px light-dark(color-mix(in oklch, black, transparent 90%), color-mix(in oklch, white, transparent 85%)) inset,
        0px 4px 16px rgba(17, 17, 26, 0.05),
        0px 8px 24px rgba(17, 17, 26, 0.05),
        0px 16px 56px rgba(17, 17, 26, 0.05),
        0px 4px 16px rgba(17, 17, 26, 0.05) inset,
        0px 8px 24px rgba(17, 17, 26, 0.05) inset,
        0px 16px 56px rgba(17, 17, 26, 0.05) inset;
    }
    .glass-surface--fallback {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px) saturate(1.8) brightness(1.2);
      -webkit-backdrop-filter: blur(12px) saturate(1.8) brightness(1.2);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow:
        inset 0 1px 0 0 rgba(255, 255, 255, 0.2),
        inset 0 -1px 0 0 rgba(255, 255, 255, 0.1);
    }
  </style>
</head>

<body>
  <div id="clock"><span id="clockText">00:00:00</span></div>
  <div id="overlay" role="region" aria-label="View switch">
    <div id="tabs" role="tablist" aria-label="Categories">
      <span id="seg-thumb" aria-hidden="true"></span>
      <span id="seg-hover" aria-hidden="true"></span>
      <button id="tab-walk" class="tabbtn" role="tab" aria-selected="false">Walk</button>
      <button id="tab-home" class="tabbtn" role="tab" aria-selected="false">Home</button>
      <button id="tab-drive" class="tabbtn" role="tab" aria-selected="false">Drive</button>
    </div>
  </div>
  <iframe id="player" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>

  <script>
    // List of YouTube walking tour video IDs
    const videos = [

    // Optional route-specific lists
      const ROUTES = {

        ]
      };

      function getYTFromURL() {
          const h = location.hash.startsWith('#yt=') ? decodeURIComponent(location.hash.slice(4)) : null;
          if (h) return h;
          const qs = new URLSearchParams(location.search).get('yt');
          return qs ? decodeURIComponent(qs) : null;
        }

      function clearYTFromURL() {
          const url = new URL(location.href);
          url.hash = "";
          url.searchParams.delete("yt");
          history.replaceState(null, "", url);
        }

      // Extract YT id from full URLs or plain IDs
      function getYouTubeId(input) {
        if (!input) return null;
        if (/^[a-zA-Z0-9_-]{11}$/.test(input)) return input;
        try {
          const u = new URL(input);
          if (u.hostname.includes("youtu.be")) return u.pathname.split("/")[1] || null;
          if (u.searchParams.get("v")) return u.searchParams.get("v");
          const m = u.pathname.match(/\/embed\/([a-zA-Z0-9_-]{11})/);
          if (m) return m[1];
        } catch { }
        return null;
      }

      // ---- Overlay tabs + routing (non-breaking) ----
        const $player = document.getElementById("player");
        const tabs = {
          walk: document.getElementById("tab-walk"),
          home: document.getElementById("tab-home"),
          drive: document.getElementById("tab-drive"),
        };

        const thumb = document.getElementById("seg-thumb");

        function _posThumb(btn) {
          if (!btn || !thumb) return;
          const w = btn.offsetWidth;       // includes padding
          const x = btn.offsetLeft;        // from tabs' padding edge
          thumb.style.width = w + "px";
          thumb.style.transform = `translateX(${x}px)`;
        }

        if (document.fonts?.ready) {
            document.fonts.ready.then(() => {
              const active = document.querySelector('.tabbtn[aria-selected="true"]');
              _posThumb(active || tabs.walk);
            });
          }

        function setList(list, withRandomStart = true) {
          const first = list[Math.floor(Math.random() * list.length)];
          const playlist = [first, ...list.filter(v => v !== first)];
          const approxStart = withRandomStart ? Math.floor(Math.random() * 1200) : 0;
          const url = `https://www.youtube.com/embed/${first}?autoplay=1&mute=1&loop=1&playlist=${playlist.join(",")}` +
            `&start=${approxStart}&controls=1&modestbranding=1&rel=0&disablekb=0&playsinline=1`;
          $player.src = url;
        }
        function selectTab(route) {
            let activeBtn = null;
            for (const [k, btn] of Object.entries(tabs)) {
              if (!btn) continue;
              const sel = (k === route);
              btn.setAttribute("aria-selected", String(sel));
              if (sel) activeBtn = btn;
            }
            _posThumb(activeBtn || tabs.walk);
          }
        function getInitialRoute() {
            if (getYTFromURL()) return "yt";
            const path = location.pathname.replace(/^\//, '');
            if (path === "home") return "home";
            if (path === "drive") return "drive";
            return "walk";
          }

       window.addEventListener("popstate", () => {
          const yt = getYTFromURL();
          if (yt) setRoute("yt");
          else setRoute(getInitialRoute());
        });

        window.addEventListener("hashchange", () => {
            if (getYTFromURL()) setRoute("yt");
          });


        function setRoute(route) {
          if (route === "yt") {
            const raw = getYTFromURL();
            const vid = getYouTubeId(raw) || videos[0];
            const url = `https://www.youtube.com/embed/${vid}?autoplay=1&mute=1&loop=1&playlist=${vid}&controls=1&modestbranding=1&rel=0&disablekb=0&playsinline=1`;
            $player.src = url;
            selectTab("walk");
            return; // keep whatever URL form was used
          }

          if (route === "home") { clearYTFromURL(); setList(ROUTES.home); selectTab("home"); }
          else if (route === "drive") { clearYTFromURL(); setList(ROUTES.drive); selectTab("drive"); }
          else { clearYTFromURL(); setList(videos); selectTab("walk"); route = "walk"; }

          const newPath = route === "walk" ? "/" : `/${route}`;
          if (location.pathname !== newPath) { history.replaceState(null, "", newPath); }
          try { localStorage.setItem("lastRoute", route); } catch { }
        }
        // init (safe to run after your existing player setup)
          const savedRoute = (() => { try { return localStorage.getItem("lastRoute") } catch { return null } })();
          const initialRoute = getYTFromURL() ? "yt" : (savedRoute || getInitialRoute());
            setRoute(initialRoute);
          _posThumb(document.querySelector('.tabbtn[aria-selected="true"]'));
          setTimeout(() => document.body.classList.add("overlay-visible"), 300);

          // keep thumb aligned when window resizes
          window.addEventListener("resize", () => {
            const active = document.querySelector('.tabbtn[aria-selected="true"]');
            _posThumb(active || tabs.walk);
          });

        // click bindings
        tabs.walk?.addEventListener("click", () => setRoute("walk"));
        tabs.home?.addEventListener("click", () => setRoute("home"));
        tabs.drive?.addEventListener("click", () => setRoute("drive"));

        // keyboard shortcuts
        document.addEventListener("keydown", (e) => {
          if (e.key === "1") setRoute("walk");
          else if (e.key === "2") setRoute("home");
          else if (e.key === "3") setRoute("drive");
        });

        // motion-reveal overlay
        let _hideTimer = null;
        function _showOverlay() {
          document.body.classList.add("overlay-visible");
          clearTimeout(_hideTimer);
          _hideTimer = setTimeout(() => document.body.classList.remove("overlay-visible"), 3500);
        }
        ["mousemove", "touchstart", "keydown"].forEach(evt => {
          document.addEventListener(evt, _showOverlay, { passive: true });
        });
        // brief initial reveal for discoverability
        setTimeout(_showOverlay, 300);

   const hoverThumb = document.getElementById('seg-hover');

function moveThumbTo(btn, el){
  if(!btn || !el) return;
  el.style.width = btn.offsetWidth + 'px';
  el.style.transform = `translateX(${btn.offsetLeft}px)`;
}

// show hover ghost only on non-selected targets
Object.values(tabs).forEach(btn=>{
  btn?.addEventListener('mouseenter', ()=>{
    const isSelected = btn.getAttribute('aria-selected') === 'true';
    hoverThumb.style.opacity = isSelected ? 0 : 1;
    moveThumbTo(btn, hoverThumb);
  });
  btn?.addEventListener('focus', ()=>{
    const isSelected = btn.getAttribute('aria-selected') === 'true';
    hoverThumb.style.opacity = isSelected ? 0 : 1;
    moveThumbTo(btn, hoverThumb);
  });
});

// hide ghost when leaving the tablist
const tablist = document.getElementById('tabs');
tablist.addEventListener('mouseleave', ()=> { hoverThumb.style.opacity = 0; });

// keep ghost hidden when selection changes
const _selectTabOrig = selectTab;
selectTab = function(route){
  _selectTabOrig(route);
  hoverThumb.style.opacity = 0;
};

    const clockText = document.getElementById('clockText');

    // Clock
    function tick() {
        const now = new Date();
        const t = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
        clockText.textContent = t;   // <-- use the span
      }
    tick();
    setInterval(tick, 1000);

    // ── GlassSurface (ported from reactbits) ──
    function createGlassSurface(element, options = {}) {
      const {
        borderRadius = 20,
        borderWidth = 0.07,
        brightness = 50,
        opacity = 0.93,
        blur = 11,
        distortionScale = -180,
        redOffset = 0,
        greenOffset = 10,
        blueOffset = 20,
        xChannel = 'R',
        yChannel = 'G',
        mixBlendMode = 'difference',
        backgroundOpacity = 0,
        saturation = 1,
        displace = 0,
      } = options;

      const uid = Math.random().toString(36).slice(2, 9);
      const filterId = `gf-${uid}`;
      const redGradId = `rg-${uid}`;
      const blueGradId = `bg-${uid}`;
      const svgNS = 'http://www.w3.org/2000/svg';

      element.classList.add('glass-surface');
      element.style.setProperty('--glass-frost', backgroundOpacity);
      element.style.setProperty('--glass-saturation', saturation);

      // Build SVG filter
      const filterSvg = document.createElementNS(svgNS, 'svg');
      filterSvg.classList.add('glass-surface__filter');
      filterSvg.setAttribute('xmlns', svgNS);

      const filter = document.createElementNS(svgNS, 'filter');
      filter.setAttribute('id', filterId);
      filter.setAttribute('color-interpolation-filters', 'sRGB');
      filter.setAttribute('x', '0%');
      filter.setAttribute('y', '0%');
      filter.setAttribute('width', '100%');
      filter.setAttribute('height', '100%');

      const feImg = document.createElementNS(svgNS, 'feImage');
      feImg.setAttribute('result', 'dispMap');
      feImg.setAttribute('preserveAspectRatio', 'none');

      function makeChannel(label, offset, keepFunc) {
        const disp = document.createElementNS(svgNS, 'feDisplacementMap');
        disp.setAttribute('in', 'SourceGraphic');
        disp.setAttribute('in2', 'dispMap');
        disp.setAttribute('scale', distortionScale + offset);
        disp.setAttribute('xChannelSelector', xChannel);
        disp.setAttribute('yChannelSelector', yChannel);
        disp.setAttribute('result', label);

        const ct = document.createElementNS(svgNS, 'feComponentTransfer');
        ct.setAttribute('in', label);
        ct.setAttribute('result', label + 'Only');
        ['R', 'G', 'B'].forEach(ch => {
          const fn = document.createElementNS(svgNS, `feFunc${ch}`);
          fn.setAttribute('type', ch === keepFunc ? 'identity' : 'discrete');
          if (ch !== keepFunc) fn.setAttribute('tableValues', '0');
          ct.appendChild(fn);
        });
        return [disp, ct];
      }

      const [dR, cR] = makeChannel('red', redOffset, 'R');
      const [dG, cG] = makeChannel('green', greenOffset, 'G');
      const [dB, cB] = makeChannel('blue', blueOffset, 'B');

      const blendRG = document.createElementNS(svgNS, 'feBlend');
      blendRG.setAttribute('in', 'redOnly');
      blendRG.setAttribute('in2', 'greenOnly');
      blendRG.setAttribute('mode', 'screen');
      blendRG.setAttribute('result', 'rg');

      const blendRGB = document.createElementNS(svgNS, 'feBlend');
      blendRGB.setAttribute('in', 'rg');
      blendRGB.setAttribute('in2', 'blueOnly');
      blendRGB.setAttribute('mode', 'screen');
      blendRGB.setAttribute('result', 'rgb');

      [feImg, dR, cR, dG, cG, dB, cB, blendRG, blendRGB].forEach(n => filter.appendChild(n));

      if (displace > 0) {
        const gb = document.createElementNS(svgNS, 'feGaussianBlur');
        gb.setAttribute('in', 'rgb');
        gb.setAttribute('stdDeviation', displace);
        filter.appendChild(gb);
      }

      filterSvg.appendChild(filter);
      element.prepend(filterSvg);

      // Displacement map generator
      function generateMap() {
        const rect = element.getBoundingClientRect();
        const w = rect.width || 400;
        const h = rect.height || 200;
        const edge = Math.min(w, h) * (borderWidth * 0.5);
        const svg = `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="${redGradId}" x1="100%" y1="0%" x2="0%" y2="0%">
              <stop offset="0%" stop-color="#0000"/><stop offset="100%" stop-color="red"/>
            </linearGradient>
            <linearGradient id="${blueGradId}" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#0000"/><stop offset="100%" stop-color="blue"/>
            </linearGradient>
          </defs>
          <rect width="${w}" height="${h}" fill="black"/>
          <rect width="${w}" height="${h}" rx="${borderRadius}" fill="url(#${redGradId})"/>
          <rect width="${w}" height="${h}" rx="${borderRadius}" fill="url(#${blueGradId})" style="mix-blend-mode:${mixBlendMode}"/>
          <rect x="${edge}" y="${edge}" width="${w - edge * 2}" height="${h - edge * 2}" rx="${borderRadius}" fill="hsl(0 0% ${brightness}% / ${opacity})" style="filter:blur(${blur}px)"/>
        </svg>`;
        return 'data:image/svg+xml,' + encodeURIComponent(svg);
      }

      function updateMap() {
        const uri = generateMap();
        feImg.setAttributeNS('http://www.w3.org/1999/xlink', 'xlink:href', uri);
        feImg.setAttribute('href', uri);
      }

      // SVG filter support detection (Chromium supports backdrop-filter + url())
      const svgOk = (() => {
        try {
          const t = document.createElement('div');
          t.style.backdropFilter = 'url(#_t)';
          return t.style.backdropFilter !== '';
        } catch { return false; }
      })();

      if (svgOk) {
        element.classList.add('glass-surface--svg');
        element.style.setProperty('--filter-id', `url(#${filterId})`);
        updateMap();
        new ResizeObserver(() => updateMap()).observe(element);
      } else {
        element.classList.add('glass-surface--fallback');
        filterSvg.remove();
      }
    }

    createGlassSurface(document.getElementById('clock'), {
      borderRadius: 16,
      brightness: 50,
      opacity: 0.93,
      blur: 11,
      distortionScale: -180,
      redOffset: 0,
      greenOffset: 10,
      blueOffset: 20,
      backgroundOpacity: 0,
      saturation: 1
    });

    createGlassSurface(document.getElementById('tabs'), {
      borderRadius: 16,
      brightness: 50,
      opacity: 0.93,
      blur: 11,
      distortionScale: -180,
      redOffset: 0,
      greenOffset: 10,
      blueOffset: 20,
      backgroundOpacity: 0,
      saturation: 1
    });
  </script>
